name: Vapor

on:
  push:
    branches:
      - main
    paths:
      - "BIRGEPassenger/birge-vapor/**"

jobs:
  build-test:
    name: Build and Test Vapor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Build
        working-directory: BIRGEPassenger/birge-vapor
        run: swift build

      - name: Test
        working-directory: BIRGEPassenger/birge-vapor
        run: swift test
